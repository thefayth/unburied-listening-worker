  <g fill="#f7efe3">
    <path d="M225 210l-14-9v18z"/><path d="M421 210l-14-9v18z"/><path d="M615 210l-14-9v18z"/><path d="M810 210l-14-9v18z"/>
    <path d="M910 327l-9-14h18z"/><path d="M755 375l15-2-8-14z"/>
